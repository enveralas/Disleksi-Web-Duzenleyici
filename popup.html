<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Disleksi Modu</title>

  <style>
    body {
      width: 230px;
      padding: 12px;
      font-family: Arial;
      background: #f4ecd8;
    }

    select, input, button {
      width: 100%;
      margin-top: 6px;
      padding: 6px;
    }

    #durum {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>

<body>

  <h3>Disleksi Modu</h3>

  <input id="apiKey" placeholder="API Key gir">

  <button id="saveKey">Kaydet</button>

  <select id="fontSelect">
    <option value="OpenDyslexic">OpenDyslexic</option>
    <option value="Arial">Arial</option>
    <option value="Verdana">Verdana</option>
    <option value="Lexend">Lexend</option>
  </select>

  <!-- YENİ -->
  <input type="range" id="fontSize" min="16" max="30" value="20">

  <button id="togglePage">Disleksi Modu</button>

  <div id="durum"></div>

  <script src="popup.js"></script>

</body>
</html>
