<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <title>Disleksi Modu</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="kutu">

    <h2>Disleksi Modu</h2>

    <select id="fontSelect">

      <option value="OpenDyslexic">
        OpenDyslexic
      </option>

      <option value="Arial">
        Arial
      </option>

      <option value="Verdana">
        Verdana
      </option>

      <option value="Lexend">
        Lexend
      </option>

    </select>

    <div id="fontSizeText">
      Boyut: 20
    </div>

    <input
      type="range"
      id="fontSize"
      min="14"
      max="40"
      value="20"
    >

    <button id="togglePage">
      Disleksi Modu Aç/Kapat
    </button>

    <div id="durum"></div>

  </div>

  <script src="popup.js"></script>

</body>

</html>
